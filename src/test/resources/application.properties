# =============================================
# CONFIGURACIÓN H2 PARA TESTS
# (src/test/resources/application.properties)
# =============================================

# Base de datos H2 en memoria para todos los tests que usen @SpringBootTest
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Desactivar el servidor web por defecto en los tests de integracion
# (Los tests con RANDOM_PORT lo sobreescriben con su propio entorno)
spring.main.web-application-type=servlet
